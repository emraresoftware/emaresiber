version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./reports:/app/reports
      - ./knowledge_base:/app/knowledge_base
    restart: unless-stopped

  neo4j:
    image: neo4j:5.25-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pentest
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pentest"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Ollama for on-prem LLM
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - onprem

  # Attack-path visualizer (static file server)
  visualizer:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend/visualizer:/usr/share/nginx/html:ro
    profiles:
      - frontend

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
  ollama_data:
